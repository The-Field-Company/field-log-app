name: fieldlog_mobile
description: "FieldLog - Scientific field data collection mobile app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  google_fonts: ^6.0.0
  geolocator: ^13.0.0
  shared_preferences: ^2.3.0
  powersync: ^1.9.0
  path_provider: ^2.1.0
  uuid: ^4.5.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter_native_splash:
  color: "#1B4332"
  image: "assets/logo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
