name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write .env.json
        run: |
          cat > .env.json <<EOF
          {
            "SERVER_URL": "${{ secrets.SERVER_URL }}",
            "POWERSYNC_URL": "${{ secrets.POWERSYNC_URL }}",
            "GLITCHTIP_DSN": "${{ secrets.GLITCHTIP_DSN }}"
          }
          EOF

      - name: Decode keystore
        working-directory: android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > fieldlog-release.jks

      - name: Write key.properties
        working-directory: android
        run: |
          cat > key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=fieldlog
          storeFile=../fieldlog-release.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release --dart-define-from-file=.env.json

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/FieldLog-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: build/app/outputs/flutter-apk/FieldLog-${{ github.ref_name }}.apk
          generate_release_notes: true
