name: Android Branch Build

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write .env.json
        run: |
          cat > .env.json <<EOF
          {
            "SERVER_URL": "${{ secrets.SERVER_URL }}",
            "POWERSYNC_URL": "${{ secrets.POWERSYNC_URL }}",
            "GLITCHTIP_DSN": "${{ secrets.GLITCHTIP_DSN }}"
          }
          EOF

      - name: Decode keystore
        working-directory: android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > fieldlog-release.jks

      - name: Write key.properties
        working-directory: android
        run: |
          cat > key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=fieldlog
          storeFile=../fieldlog-release.jks
          EOF

      - name: Sanitise branch name and short SHA
        id: meta
        run: |
          echo "branch=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build release APK
        run: flutter build apk --release --dart-define-from-file=.env.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FieldLog-${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
